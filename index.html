<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Alex3236">
    <meta name="description" content="Badge generator for sponsor page">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>头像链接获取</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧰</text></svg>">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/indrimuska/jquery-editable-select@2.2.5/dist/jquery-editable-select.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div id="loading">
        <div id="loader"></div>
    </div>
    <div class="container py-5">
        <div class="alert alert-primary" role="alert">
            <h4>头像链接获取</h4><strong>【用户名】</strong>即 Gravatar 邮箱 / QQ 号 / Github 用户名
        </div>
        <div class="row my-3">
            <form class="col-9" oninput="generate()">
                <div class="mt-3 mb-2 col">
                    <div class="input-group input-group-sm"><label for="platform" class="input-group-text">头像平台</label>
                        <select class="form-select" id="platform">
                            <option value="gravatar_zenruns">Gravatar（Zeruns 镜像，推荐）</option>
                            <option value="gravatar">Gravatar（源站）</option>
                            <option value="alapi">Gravatar / QQ（ALAPI）</option>
                            <option value="qq_weserv">QQ（Images.weserv.nl）</option>
                            <option value="gh">Github（源站）</option>
                            <option value="gh_weserv">Github（Images.weserv.nl）</option>
                        </select></div>
                </div>
                <div class="mb-2 col">
                    <div class="input-group input-group-sm"><label for="val" class="input-group-text">用户名</label> <input
                            class="form-control" type="text" class="form-control" id="val"></div>
                </div>
                <div>
                    <div class="input-group input-group-sm"><label for="link" class="input-group-text">头像链接</label>
                        <input disabled type="text" class="form-control" id="link">
                        <div class="input-group-append"><button class="btn btn-outline-secondary" type="button"
                                onClick="copy(this, document.getElementById('link').value)">复制</button></div>
                    </div>
                </div>
            </form>
            <div class="col-3 mt-3">
                <div class="border border-2 rounded-circle avatar" id="avatar"></div>
            </div>
        </div>
        <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.js"></script>
        <script src="https://www.myersdaily.org/joseph/javascript/md5.js"></script>
        <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
        <script src="main.js"></script>
        <script>$('#loading').fadeOut(500, () => { $('#loading').remove(); });</script>
    </div>
</body>
</html>
